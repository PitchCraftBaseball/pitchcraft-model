name: Build model image & deploy 

on: 
  push: 
    branches: ["main"]

env: 
  OWNER: pitchcraftbaseball
  REGISTRY: ghcr.io

jobs: 
  build-and-push: 
    runs-on: ubuntu-latest
    permissions:
      contents: read 
      packages: write
    steps: 
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build & push model server 
        uses: docker/build-push-action@v6
        with: 
          context: ./
          file: ./Dockerfile 
          push: true 
          platforms: linux/arm64
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER }}/pitchcraft-model:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER }}/pitchcraft-model:buildcache,mode=max
          tags: |
            ghcr.io/${{ env.OWNER }}/pitchcraft-model:${{ github.sha }}
            ghcr.io/${{ env.OWNER }}/pitchcraft-model:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions: 
      contents: read
      packages: read
    steps: 
      - uses: actions/checkout@v4

      - name: Upload compose for model server to EC2 
        uses: appleboy/scp-action@v0.1.7
        with: 
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: /opt/pitchcraft-model
          strip_components: 0
          debug: true
      
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/pitchcraft-model
            cd /opt/pitchcraft-model 
            truncate -s 0 /opt/pitchcraft-model/.env
            echo "IMAGE_TAG=${{ github.sha }}" >> .env.runtime
            echo "DB_USER=${{ secrets.DB_USER }}" /opt/pitchcraft-model/.env
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> /opt/pitchcraft-model/.env
            echo "DB_HOST=${{ secrets.DB_HOST }}" >> /opt/pitchcraft-model/.env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> /opt/pitchcraft-model/.env
            echo "DB_PORT=${{ secrets.DB_PORT }}" >> /opt/pitchcraft-model/.env
            echo "DB_RDS_CERT_PATH=${{ secrets.DB_RDS_CERT_PATH }}" >> /opt/pitchcraft-model/.env
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            DC="docker compose"
            if command -v docker-compose >/dev/null 2>&1; then DC="docker-compose"; fi
            $DC --env-file .env.runtime pull 
            $DC --env-file .env.runtime up -d --remove-orphans
            docker image prune -f
            